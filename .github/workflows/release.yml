name: Release Obsidian plugin

on:
    workflow_dispatch:
        inputs:
            release-version:
                description: New version to release (e.g. 1.0.9) or use basic computation to get to next release version
                required: false
                default: ""
            dry-run:
                description: Simulate release but don't push or create a release
                required: false
                default: false
                type: boolean

jobs:
    compute-version:
        runs-on: ubuntu-latest
        outputs:
            release-version: ${{ steps.out.outputs.version }}
        env:
            INPUT_RELEASE_VERSION: ${{ inputs.release-version }}
        steps:
            - name: Compute
              id: out
              run: |
                  set -euo pipefail

                  if [ -n "${INPUT_RELEAVE_VERSION:-}" ]; then
                      target_version="$INPUT_RELEAVE_VERSION"
                  else
                      highest_tag=$(git describe --tags --abbrev=0 | tr -d '\n')

                      IFS='.' read -r major minor patch <<< "$highest_tag"

                      if [ "$patch" -lt 9 ]; then
                          target_version="${major}.${minor}.$((patch + 1))"
                      elif [ "$minor" -lt 9 ]; then
                          target_version="${major}.$((minor + 1)).0"
                      else
                          target_version="$((major + 1)).0.0"
                      fi
                  fi

                  echo "New release version: $target_version"
                  echo "release-version=$target_version" >> "$GITHUB_OUTPUT"

    build-release:
        runs-on: ubuntu-latest
        needs: compute-version
        outputs:
            release_sha: ${{ steps.push-branch.outputs.sha }}
            release_branch: ${{ steps.create-branch.outputs.branch }}
        steps:
            - uses: actions/checkout@v3

            - name: Validate repo
              shell: bash
              env:
                  ACTION_PATH: ${{ github.action_path }}
              run: bash "$ACTION_PATH/scripts/validate.sh"

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Ensure tag does not already exists remotly
              env:
                  RELEASE_VERSION: ${{ needs.compute-version.outputs.release-version }}
              run: |
                  set -euo pipefail
                  if git ls-remote --tags origin "refs/tags/$RELEASE_VERSION" | grep -q .; then
                      echo "Tag $RELEASE_VERSION already exists on origin"; exit 1;
                  fi

            - name: Create release branch
              id: create-branch
              env:
                  RELEASE_VERSION: ${{ needs.compute-version.outputs.release-version }}
              run: |
                  set -euo pipefailq
                  BRANCH="release/$RELEASE_VERSION"
                  git switch -c "$BRANCH"
                  echo "branch=$BRANCH" >> "GITHUB_OUTPUT"

            - name: Set release version
              env:
                  RELEASE_VERSION: ${{ needs.compute-version.outputs.release-version }}
              run: |
                  echo "Updating files to version $RELEASE_VERSION"

                  jq --arg version "$RELEASE_VERSION" \
                     '.version = $version' \
                     manifest.json > manifest.json.tmp

                  mv manifest.json.tmp manifest.json

                  MIN_APP_VERSION=$(jq -r '.minAppVersion' manifest.json)

                  jq --arg version "$RELEASE_VERSION" \
                     --arg minAppVersion "$MIN_APP_VERSION" \
                     '.[$version] = $minAppVersion' \
                     versions.json > versions.json.tmp

                  mv versions.json.tmp versions.json


                  jq --arg version "$RELEASE_VERSION" \
                     '.version = $version' \
                     package.json > package.json.tmp

                  mv package.json.tmp package.json

            - name: Lint repo
              shell: bash
              env:
                  ACTION_PATH: ${{ github.action_path }}
              run: bash "$ACTION_PATH/scripts/linter.sh"

            - name: Setup bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Build plugin
              run: |
                  set -euo pipefail
                  bun install
                  bun run build

            - name: Commit release version
              env:
                  RELEASE_VERSION: ${{ needs.compute-version.outputs.release-version }}
              run: |
                  set -euo pipefail
                  git add package.json versions.json manifest.json
                  git commit -m "[ci skip] chore(Release): :bookmark: Release version $RELEASE_VERSION"

            - name: Push release branch
              id: push-branch
              env:
                  BRANCH: ${{ steps.create-branch.outputs.branch }}
              run: |
                  set -euo pipefail
                  git push origin "$BRANCH"
                  echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    finalize:
        runs-on: ubuntu-latest
        needs: [compute-version, build-release]

        steps:
            - uses: actions/checkout@v3

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Setup bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Merge release branch into main
              if: ${{ inputs.dry-run != true }}
              env:
                  BRANCH: ${{ needs.build-release.outputs.release_branch }}
              run: |
                  set -euo pipefail
                  git fetch origin "$BRANCH"
                  git checkout "${GITHUB_REF_NAME}"
                  git merge --ff-only "origin/$BRANCH"

            - name: Tag release and push
              if: ${{ inputs.dry-run != true }}
              env:
                  TAG: ${{ needs.compute-version.outputs.release-version }}
                  RELEASE_SHA: ${{ needs.build-release.outputs.release_sha }}
              run: |
                  set -euo pipefail
                  git tag "$TAG" "$RELEASE_SHA"
                  git push origin "${GITHUB_REF_NAME}" "refs/tags/$TAG"

            - name: Build plugin
              run: |
                  bun install
                  bun run build

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: ${{ needs.compute-version.outputs.release-version }}
              run: |
                  notes_file="release-notes.md"
                  notes_option=""
                  if [ -f "$notes_file" ]; then
                      notes_option="--notes-file=$notes_file"
                  fi

                  gh release create "$TAG" \
                      --title="$TAG" \
                      $notes_option \
                      main.js manifest.json styles.css

            - name: Delete release branch
              if: ${{ always() }}
              env:
                  BRANCH: ${{ needs.build-release.outputs.release_branch }}
              run: |
                  set -euo pipefail
                  git push origin --delete "$BRANCH" 2>/dev/null || echo "! Branch $BRANCH already deleted or not found"
